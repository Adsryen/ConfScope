name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            goarch: amd64
          - os: windows-latest
            platform: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.goarch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Linux 需要 WebKit/GTK 开发库
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build
        run: wails build -clean
        env:
          GOARCH: ${{ matrix.goarch }}

      # macOS 打包成 .dmg 安装镜像
      - name: Package macOS artifact
        if: matrix.platform == 'darwin'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "ConfScope" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon "ConfScope.app" 150 200 \
            --app-drop-link 450 200 \
            "build/bin/ConfScope-darwin-${{ matrix.goarch }}.dmg" \
            "build/bin/ConfScope.app" || true

      - name: Upload artifact (macOS)
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: ConfScope-darwin-${{ matrix.goarch }}
          path: build/bin/ConfScope-darwin-${{ matrix.goarch }}.dmg

      - name: Upload artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ConfScope-windows-amd64
          path: build/bin/ConfScope.exe

      # Linux 打包原始二进制 + .deb + .rpm
      - name: Package Linux tarball
        if: matrix.platform == 'linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/bin
          tar czf "confscope-linux-amd64.tar.gz" ConfScope
          echo "TARBALL=confscope-linux-amd64.tar.gz" >> $GITHUB_ENV

      - name: Package Linux .deb
        if: matrix.platform == 'linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="confscope_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          cp build/bin/ConfScope "${PKG}/usr/bin/confscope"
          chmod 755 "${PKG}/usr/bin/confscope"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/confscope.png"
          cp build/linux/confscope.desktop "${PKG}/usr/share/applications/"

          printf '%s\n' \
            "Package: confscope" \
            "Version: ${VERSION}" \
            "Section: devel" \
            "Priority: optional" \
            "Architecture: amd64" \
            "Depends: libgtk-3-0, libwebkit2gtk-4.0-37" \
            "Maintainer: ConfScope <noreply@github.com>" \
            "Description: ConfScope - 配置中心管理工具" \
            " 浏览、对比、洞察多配置中心的配置差异。" \
            > "${PKG}/DEBIAN/control"

          dpkg-deb --root-owner-group --build "${PKG}"
          mv "${PKG}.deb" "build/bin/confscope-linux-amd64.deb"

      - name: Package Linux .rpm
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get install -y rpm
          VERSION="${GITHUB_REF_NAME#v}"
          TOPDIR="${HOME}/rpmbuild"
          mkdir -p "${TOPDIR}"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # spec 文件
          cat > "${TOPDIR}/SPECS/confscope.spec" <<EOF
          Name:           confscope
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        配置中心管理工具

          License:        MIT
          URL:            https://github.com/${{ github.repository }}

          Requires:       gtk3
          Requires:       webkit2gtk4.0

          %description
          浏览、对比、洞察多配置中心的配置差异。

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cp %{_sourcedir}/ConfScope %{buildroot}/usr/bin/confscope
          chmod 755 %{buildroot}/usr/bin/confscope
          cp %{_sourcedir}/confscope.desktop %{buildroot}/usr/share/applications/
          cp %{_sourcedir}/confscope.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/

          %files
          /usr/bin/confscope
          /usr/share/applications/confscope.desktop
          /usr/share/icons/hicolor/256x256/apps/confscope.png
          EOF

          # 把构建产物放到 SOURCES
          cp build/bin/ConfScope "${TOPDIR}/SOURCES/"
          cp build/linux/confscope.desktop "${TOPDIR}/SOURCES/"
          cp build/appicon.png "${TOPDIR}/SOURCES/confscope.png"

          rpmbuild -bb "${TOPDIR}/SPECS/confscope.spec"
          cp "${TOPDIR}/RPMS/x86_64"/confscope-*.rpm "build/bin/confscope-linux-amd64.rpm"

      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ConfScope-linux-amd64
          path: |
            build/bin/confscope-linux-amd64.tar.gz
            build/bin/confscope-linux-amd64.deb
            build/bin/confscope-linux-amd64.rpm

  generate-manifest:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      manifest: ${{ steps.manifest.outputs.json }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate update.json
        id: manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(gh release view "${GITHUB_REF_NAME}" --json body -q .body 2>/dev/null || echo "")

          # Windows
          WIN_SHA256=$(sha256sum "artifacts/ConfScope-windows-amd64/ConfScope.exe" | awk '{print $1}')

          # Linux
          LINUX_TAR_SHA256=$(sha256sum "artifacts/ConfScope-linux-amd64/confscope-linux-amd64.tar.gz" | awk '{print $1}')
          LINUX_DEB_SHA256=$(sha256sum "artifacts/ConfScope-linux-amd64/confscope-linux-amd64.deb" | awk '{print $1}')
          LINUX_RPM_SHA256=$(sha256sum "artifacts/ConfScope-linux-amd64/confscope-linux-amd64.rpm" | awk '{print $1}')

          cat > update.json <<EOF
          {
            "version": "${VERSION}",
            "notes": ${NOTES:+$(echo "$NOTES" | jq -Rs .)}${NOTES:-"发行版 ${VERSION}"},
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mandatory": false,
            "platforms": {
              "windows-amd64": {
                "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/ConfScope.exe",
                "sha256": "${WIN_SHA256}",
                "fileName": "ConfScope.exe"
              },
              "linux-amd64": {
                "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/confscope-linux-amd64.tar.gz",
                "sha256": "${LINUX_TAR_SHA256}",
                "fileName": "confscope-linux-amd64.tar.gz"
              },
              "linux-amd64-deb": {
                "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/confscope-linux-amd64.deb",
                "sha256": "${LINUX_DEB_SHA256}",
                "fileName": "confscope-linux-amd64.deb"
              },
              "linux-amd64-rpm": {
                "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/confscope-linux-amd64.rpm",
                "sha256": "${LINUX_RPM_SHA256}",
                "fileName": "confscope-linux-amd64.rpm"
              }
            }
          }
          EOF

          cat update.json
          echo "json=$(cat update.json | jq -c .)" >> $GITHUB_OUTPUT
          cp update.json artifacts/update.json

      - name: Upload update.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-manifest
          path: artifacts/update.json

  release:
    needs: [build, generate-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ConfScope-windows-amd64/ConfScope.exe
            artifacts/ConfScope-linux-amd64/confscope-linux-amd64.tar.gz
            artifacts/ConfScope-linux-amd64/confscope-linux-amd64.deb
            artifacts/ConfScope-linux-amd64/confscope-linux-amd64.rpm
            artifacts/update-manifest/update.json